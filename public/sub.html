<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ASTRA-X — Activate Bot</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;
  background:
    radial-gradient(ellipse at 20% 10%,rgba(239,68,68,.1) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 90%,rgba(212,175,55,.08) 0%,transparent 50%),
    linear-gradient(170deg,#080003,#050003,#080500);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px 16px;
}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:300% center}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

.logo{text-align:center;margin-bottom:28px;animation:fadein .5s ease}
.logo-icon{font-size:3rem;animation:float 3s ease-in-out infinite}
.logo-title{
  font-size:1.8rem;font-weight:900;letter-spacing:2px;margin-top:10px;
  background:linear-gradient(90deg,#b91c1c,#ef4444,#f87171,#ef4444,#b91c1c);
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 4s linear infinite;
}
.logo-sub{font-size:.82rem;color:rgba(248,113,113,.5);margin-top:5px;letter-spacing:.5px}

.card{
  width:100%;max-width:400px;
  background:rgba(10,0,3,.97);
  border:1.5px solid rgba(239,68,68,.3);
  border-radius:20px;padding:28px 24px;
  box-shadow:0 24px 60px rgba(0,0,0,.85);
  animation:fadein .6s ease;
}

/* Encryption visual bars */
.enc-visual{
  display:flex;gap:3px;margin-bottom:22px;align-items:flex-end;height:30px;
}
.enc-bar{
  flex:1;background:rgba(239,68,68,.2);border-radius:3px;
  animation:enc-pulse 1.5s ease-in-out infinite;
}
.enc-bar:nth-child(1){height:40%;animation-delay:0s}
.enc-bar:nth-child(2){height:70%;animation-delay:.1s}
.enc-bar:nth-child(3){height:55%;animation-delay:.2s}
.enc-bar:nth-child(4){height:90%;animation-delay:.3s}
.enc-bar:nth-child(5){height:45%;animation-delay:.4s}
.enc-bar:nth-child(6){height:80%;animation-delay:.5s}
.enc-bar:nth-child(7){height:60%;animation-delay:.6s}
.enc-bar:nth-child(8){height:35%;animation-delay:.7s}
.enc-bar:nth-child(9){height:75%;animation-delay:.8s}
.enc-bar:nth-child(10){height:50%;animation-delay:.9s}
.enc-bar:nth-child(11){height:85%;animation-delay:1s}
.enc-bar:nth-child(12){height:40%;animation-delay:1.1s}
@keyframes enc-pulse{
  0%,100%{opacity:.3;transform:scaleY(1)}
  50%{opacity:1;transform:scaleY(1.15)}
}
.enc-label{
  text-align:center;font-size:.68rem;letter-spacing:2px;font-weight:700;
  color:rgba(239,68,68,.4);text-transform:uppercase;margin-bottom:20px;
}

.field-label{
  font-size:.7rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(239,68,68,.5);margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.field-wrap{margin-bottom:16px}
input{
  width:100%;padding:13px 16px;
  background:rgba(239,68,68,.05);
  border:1.5px solid rgba(239,68,68,.2);
  border-radius:12px;color:#f87171;font-size:.95rem;
  outline:none;transition:border-color .25s,box-shadow .25s,background .25s;
}
input:focus{
  border-color:rgba(239,68,68,.6);
  background:rgba(239,68,68,.08);
  box-shadow:0 0 0 3px rgba(239,68,68,.1);
}
input::placeholder{color:rgba(239,68,68,.2)}

.btn-login{
  width:100%;padding:14px;border:none;border-radius:12px;margin-top:6px;
  background:linear-gradient(90deg,#7f1d1d,#b91c1c,#ef4444,#f87171,#ef4444,#b91c1c,#7f1d1d);
  background-size:300%;animation:shimmer 3s linear infinite;
  color:#fff;font-weight:900;font-size:.95rem;letter-spacing:.5px;
  cursor:pointer;transition:box-shadow .2s;
}
.btn-login:hover{box-shadow:0 6px 28px rgba(239,68,68,.5)}
.btn-login:active{transform:scale(.97)}
.btn-login:disabled{opacity:.4;cursor:not-allowed;transform:none}

.divider{height:1px;margin:20px 0;background:linear-gradient(90deg,transparent,rgba(239,68,68,.2),transparent)}

.err{
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);
  border-radius:10px;padding:10px 14px;color:#f87171;font-size:.82rem;
  text-align:center;display:none;margin-top:10px;
}
.spinner{
  width:20px;height:20px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;
  display:inline-block;vertical-align:middle;margin-right:8px;
}

.footer{margin-top:20px;text-align:center;font-size:.72rem;color:rgba(239,68,68,.25)}
.footer a{color:rgba(239,68,68,.4);text-decoration:none}
.footer a:hover{color:rgba(239,68,68,.7)}

/* Toast */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(10,30,10,.97);border:1px solid rgba(52,211,153,.4);
  color:#34d399;padding:12px 24px;border-radius:12px;
  font-size:.85rem;font-weight:600;
  opacity:0;transition:opacity .4s;z-index:999;white-space:nowrap;
  pointer-events:none;text-align:center;
}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="logo">
  <div class="logo-icon">🔐</div>
  <h1 class="logo-title">ASTRA-X ACTIVATE</h1>
  <p class="logo-sub">Secure Bot Activation Portal</p>
</div>

<div class="card">
  <div class="enc-visual">
    <div class="enc-bar"></div><div class="enc-bar"></div><div class="enc-bar"></div>
    <div class="enc-bar"></div><div class="enc-bar"></div><div class="enc-bar"></div>
    <div class="enc-bar"></div><div class="enc-bar"></div><div class="enc-bar"></div>
    <div class="enc-bar"></div><div class="enc-bar"></div><div class="enc-bar"></div>
  </div>
  <div class="enc-label">🔒 256-bit Encrypted Connection</div>

  <div class="field-wrap">
    <div class="field-label">👤 Username</div>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
  </div>

  <div class="field-wrap">
    <div class="field-label">✉️ Email</div>
    <input type="email" id="email" placeholder="Enter your email address" autocomplete="email">
  </div>

  <div class="field-wrap">
    <div class="field-label">🔑 Password</div>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()">
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">
    🔐 Access Activation Panel
  </button>

  <div class="err" id="errBox"></div>

  <div class="divider"></div>

  <div class="footer">
    🔒 Your credentials are encrypted<br>
    <a href="/">← Back to Pairing</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err      = document.getElementById('errBox');
  const btn      = document.getElementById('loginBtn');

  err.style.display = 'none';

  if (!username || !email || !password) {
    err.textContent = '❌ Please fill in all fields';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Verifying...';

  try {
    const resp = await fetch('/sub/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password }),
    });
    const data = await resp.json();

    if (data.success) {
      showToast('✅ Welcome back, ' + username + '!');
      setTimeout(() => { window.location.href = '/sub/dashboard'; }, 1200);
    } else {
      err.textContent = '❌ ' + (data.message || 'Invalid credentials');
      err.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '🔐 Access Activation Panel';
    }
  } catch(e) {
    err.textContent = '❌ Network error. Try again.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '🔐 Access Activation Panel';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
